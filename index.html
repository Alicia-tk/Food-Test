<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>饭搭子匹配 | 邀请好友测试口味契合度</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: linear-gradient(145deg, #FFF5E6 0%, #FDEBD8 100%);
            font-family: 'Inter', sans-serif;
            padding: 1rem;
            color: #3A2C1F;
        }
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        .hero {
            text-align: center;
            margin-bottom: 1.8rem;
        }
        .hero h1 {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D97A2B, #B85C1A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .hero p {
            color: #7F5A3A;
            font-weight: 500;
        }
        .invite-bar {
            background: #FFF2E4;
            border-radius: 60px;
            padding: 0.5rem 1rem;
            margin-bottom: 1.2rem;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }
        .invite-btn {
            background: #D97A2B;
            border: none;
            border-radius: 40px;
            padding: 0.5rem 1.2rem;
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
        }
        .invite-link {
            background: #FFF;
            border-radius: 40px;
            padding: 0.4rem 0.8rem;
            font-size: 0.75rem;
            word-break: break-all;
            flex: 1;
            border: 1px solid #F0C9A0;
            color: #B45F2B;
        }
        .match-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }
        .user-card {
            flex: 1;
            min-width: 300px;
            background: rgba(255, 250, 240, 0.96);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.2rem;
            box-shadow: 0 12px 28px rgba(0,0,0,0.08);
            border: 1px solid #FFE4C4;
        }
        .user-title {
            font-size: 1.3rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 1rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px dashed #F0C9A0;
        }
        .question-group {
            margin-bottom: 1.2rem;
        }
        .question-label {
            font-weight: 700;
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
            color: #B45F2B;
        }
        .options-row {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .opt-btn {
            background: #FEF5EA;
            border: 1px solid #F2D8BD;
            border-radius: 60px;
            padding: 0.4rem 1rem;
            font-size: 0.8rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .opt-btn.active {
            background: #D97A2B;
            color: white;
            border-color: #D97A2B;
        }
        .opt-btn.disabled, .checkbox-item.disabled {
            opacity: 0.6;
            cursor: not-allowed;
            background: #E8E0D4;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .checkbox-item {
            background: #FEF5EA;
            border: 1px solid #F2D8BD;
            border-radius: 60px;
            padding: 0.3rem 0.9rem;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.1s;
        }
        .checkbox-item.selected {
            background: #D97A2B;
            color: white;
            border-color: #D97A2B;
        }
        .grid-2col {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, auto));
            gap: 6px;
        }
        .multi-limit-tip {
            font-size: 0.7rem;
            color: #C08142;
            margin-top: 4px;
        }
        button {
            background: #D97A2B;
            border: none;
            border-radius: 60px;
            padding: 0.6rem 1.2rem;
            font-weight: 700;
            color: white;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.15s;
        }
        button:active { transform: scale(0.97); }
        .calculate-btn {
            width: 100%;
            margin-top: 0.5rem;
            background: #B45F2B;
        }
        .result-area {
            background: #FFF8F0;
            border-radius: 2rem;
            padding: 1.2rem;
            text-align: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            margin-top: 1rem;
            border: 1px solid #F8E0C0;
        }
        .match-score {
            font-size: 2.8rem;
            font-weight: 800;
            background: linear-gradient(135deg, #D97A2B, #B85C1A);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
        }
        .match-level {
            font-size: 1.2rem;
            font-weight: 700;
            margin-top: 0.3rem;
        }
        .readonly-summary {
            background: #F9EFE3;
            border-radius: 1rem;
            padding: 0.8rem;
            max-height: 400px;
            overflow-y: auto;
            font-size: 0.75rem;
        }
        .summary-item {
            margin-bottom: 0.6rem;
            border-bottom: 1px solid #EFDECB;
            padding-bottom: 0.4rem;
        }
        footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.7rem;
            color: #C69A6D;
        }
        @media (max-width: 760px) {
            .match-panel { flex-direction: column; }
        }
        hr { margin: 0.5rem 0; border-color: #F5D5B0; }
        .copy-tip {
            font-size: 0.7rem;
            color: #B97F46;
            margin-left: 8px;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="hero">
        <h1>🍜 饭搭子匹配 · 邀请测试版</h1>
        <p>完成你的口味档案 → 生成邀请链接 → 发给好友 → 好友填写后自动匹配</p>
    </div>

    <!-- 邀请栏（仅当用户自己完成测试后显示） -->
    <div id="inviteBar" class="invite-bar" style="display: none;">
        <span>📨 邀请链接（发给饭搭子）：</span>
        <div class="invite-link" id="inviteLink">生成中...</div>
        <button id="copyInviteBtn" class="invite-btn">📋 复制链接</button>
    </div>

    <div class="match-panel">
        <!-- 左侧：当前用户（我） -->
        <div class="user-card" id="myCard">
            <div class="user-title">👤 我的口味档案</div>
            <div id="myForm"></div>
            <button id="generateInviteBtn" style="width:100%; margin-top:12px; background:#C08142;">🔗 生成邀请链接（我的答案）</button>
        </div>
        <!-- 右侧：搭子（被邀请者） -->
        <div class="user-card" id="partnerCard">
            <div class="user-title" id="partnerTitle">👥 搭子的口味档案</div>
            <div id="partnerForm"></div>
        </div>
    </div>

    <button id="matchBtn" class="calculate-btn">✨ 计算匹配度 ✨</button>
    <div id="resultArea" class="result-area">
        <div style="color: #B87A4A;">⬆️ 填写两人信息，或通过邀请链接分享后匹配 ⬆️</div>
    </div>
    <footer>⭐ 口味偏好、菜系、小料、争议食物及11组二选一 · 邀请后好友填写自动匹配</footer>
</div>

<script>
    // ================= 问题配置 =================
    const singleQuestions = [
        { id: "dietConcept", label: "🍚 饮食观念", options: ["吃饭不可以将就", "随便吃吃", "喜欢尝新", "只吃熟悉的事物"] },
        { id: "scenePref", label: "🏞️ 用餐场景偏好", options: ["路边摊", "户外野餐", "正常餐厅", "高档餐厅"] },
        { id: "drinkAttitude", label: "🥤 饮品态度", options: ["必须搭配饮品", "可有可无", "只喝纯净水"] },
        { id: "drinkPref", label: "🧋 饮品喜好", options: ["酒", "奶茶", "咖啡"] },
        { id: "eatingSpeed", label: "⏱️ 吃饭速度", options: ["半小时内解决", "一小时到一个半小时", "两小时以上"] }
    ];
    const tasteOptions = ["酸", "甜", "苦", "辣", "咸"];
    const cuisineOptions = ["苏帮菜", "川菜", "粤菜", "火锅", "烤肉", "西餐", "日料", "韩餐", "泰餐", "云南菜", "江西菜", "海鲜", "新疆菜", "东北菜", "贵州菜", "鲁菜", "福建菜", "湘菜", "西藏菜", "内蒙菜", "陕菜", "素食"];
    const toppingOptions = ["葱", "姜", "蒜", "芝麻", "花生碎", "香菜", "小米辣", "折耳根", "迷迭香", "薄荷", "罗勒叶", "百里香", "香茅草", "木姜子"];
    const controversyOptions = ["臭豆腐", "榴莲", "菠萝蜜", "肥肠", "猪脑", "内脏", "皮蛋", "螺蛳粉", "苦瓜", "豆汁儿", "臭鳜鱼", "兔肉/狗肉/猫肉", "海鲜", "血", "刺身", "肥肉", "虫/土笋冻", "秋葵"];
    const binaryQuestions = [
        { id: "riceNoodle", label: "🍚 米饭 vs 面", optA: "米饭", optB: "面" },
        { id: "fish", label: "🐟 水煮鱼 vs 酸菜鱼", optA: "水煮鱼", optB: "酸菜鱼" },
        { id: "hotpotBbq", label: "🔥 火锅 vs 烤肉", optA: "火锅", optB: "烤肉" },
        { id: "chineseWestern", label: "🥢 中餐 vs 西餐", optA: "中餐", optB: "西餐" },
        { id: "coffeeMilkTea", label: "☕ 咖啡 vs 奶茶", optA: "咖啡", optB: "奶茶" },
        { id: "egg", label: "🥚 溏心蛋 vs 全熟蛋", optA: "溏心蛋", optB: "全熟蛋" },
        { id: "peach", label: "🍑 脆桃 vs 软桃", optA: "脆桃", optB: "软桃" },
        { id: "chicken", label: "🍗 炸鸡腿 vs 烤鸡腿", optA: "炸鸡腿", optB: "烤鸡腿" },
        { id: "zongzi", label: "🎋 甜粽子 vs 肉粽子", optA: "甜粽子", optB: "肉粽子" },
        { id: "tofuBrain", label: "🥣 咸豆花 vs 甜豆花", optA: "咸豆花", optB: "甜豆花" },
        { id: "corn", label: "🌽 糯玉米 vs 水果玉米", optA: "糯玉米", optB: "水果玉米" }
    ];

    // 数据结构
    function createEmptyAnswers() {
        return {
            single: {},
            taste: [],
            cuisine: [],
            topping: [],
            controversy: [],
            binary: {}
        };
    }

    let myAnswers = createEmptyAnswers();   // 当前用户（左侧）
    let partnerAnswers = createEmptyAnswers(); // 搭子（右侧），可能从邀请加载
    let isPartnerReadonly = false;            // 是否只读模式（邀请加载时）

    // ---------- 序列化/反序列化 ----------
    function serializeAnswers(answers) {
        const json = JSON.stringify(answers);
        // 使用 base64 编码，同时做 URL 安全处理
        return btoa(encodeURIComponent(json));
    }
    function deserializeAnswers(encoded) {
        try {
            const json = decodeURIComponent(atob(encoded));
            return JSON.parse(json);
        } catch(e) { return null; }
    }

    // 生成当前页面邀请链接（携带我的答案）
    function generateInviteLink() {
        const serialized = serializeAnswers(myAnswers);
        const url = new URL(window.location.href);
        url.searchParams.set('invite', serialized);
        return url.toString();
    }

    // 检查URL参数，加载邀请数据到partner
    function loadInviteFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const inviteCode = params.get('invite');
        if (inviteCode) {
            const loaded = deserializeAnswers(inviteCode);
            if (loaded && typeof loaded === 'object') {
                partnerAnswers = loaded;
                isPartnerReadonly = true;
                // 更新标题提示
                const partnerTitle = document.getElementById('partnerTitle');
                if (partnerTitle) partnerTitle.innerHTML = "👥 好友的口味档案（已填写，只读）";
                return true;
            }
        }
        return false;
    }

    // 渲染左侧表单（我的档案，可编辑）
    function renderMyForm() {
        const container = document.getElementById('myForm');
        if (!container) return;
        container.innerHTML = buildEditableForm(myAnswers, 'my');
        attachFormEvents('my');
    }

    // 渲染右侧表单：如果只读则展示只读摘要，否则展示可编辑表单
    function renderPartnerForm() {
        const container = document.getElementById('partnerForm');
        if (!container) return;
        if (isPartnerReadonly) {
            container.innerHTML = buildReadonlySummary(partnerAnswers);
        } else {
            container.innerHTML = buildEditableForm(partnerAnswers, 'partner');
            attachFormEvents('partner');
        }
    }

    // 构建可编辑表单HTML
    function buildEditableForm(data, prefix) {
        let html = '';
        // 单选题
        singleQuestions.forEach(q => {
            const selected = data.single[q.id] !== undefined ? data.single[q.id] : -1;
            let optsHtml = '';
            q.options.forEach((opt, idx) => {
                const activeClass = (selected === idx) ? 'active' : '';
                optsHtml += `<div class="opt-btn ${activeClass}" data-qid="${q.id}" data-val="${idx}">${opt}</div>`;
            });
            html += `<div class="question-group"><div class="question-label">${q.label}</div><div class="options-row" data-group="single_${q.id}">${optsHtml}</div></div>`;
        });
        // 口味（限2）
        let tasteHtml = '';
        tasteOptions.forEach(opt => {
            const selected = data.taste.includes(opt);
            tasteHtml += `<div class="checkbox-item ${selected ? 'selected' : ''}" data-taste="${opt}">${opt}</div>`;
        });
        html += `<div class="question-group"><div class="question-label">👅 口味偏好 (最多2项)</div><div class="checkbox-group" id="tasteGroup_${prefix}">${tasteHtml}</div><div class="multi-limit-tip">✔️ 可1-2项</div></div>`;
        // 菜系
        let cuisineHtml = '';
        cuisineOptions.forEach(opt => {
            const selected = data.cuisine.includes(opt);
            cuisineHtml += `<div class="checkbox-item ${selected ? 'selected' : ''}" data-cuisine="${opt}">${opt}</div>`;
        });
        html += `<div class="question-group"><div class="question-label">🍽️ 菜系偏好 (可多选)</div><div class="checkbox-group grid-2col" id="cuisineGroup_${prefix}">${cuisineHtml}</div></div>`;
        // 小料
        let toppingHtml = '';
        toppingOptions.forEach(opt => {
            const selected = data.topping.includes(opt);
            toppingHtml += `<div class="checkbox-item ${selected ? 'selected' : ''}" data-topping="${opt}">${opt}</div>`;
        });
        html += `<div class="question-group"><div class="question-label">🧂 小料偏好 (可多选)</div><div class="checkbox-group grid-2col" id="toppingGroup_${prefix}">${toppingHtml}</div></div>`;
        // 争议食物
        let controHtml = '';
        controversyOptions.forEach(opt => {
            const selected = data.controversy.includes(opt);
            controHtml += `<div class="checkbox-item ${selected ? 'selected' : ''}" data-contro="${opt}">${opt}</div>`;
        });
        html += `<div class="question-group"><div class="question-label">⚠️ 争议食物接受度 (可多选)</div><div class="checkbox-group grid-2col" id="controversyGroup_${prefix}">${controHtml}</div></div>`;
        // 二选一
        binaryQuestions.forEach(q => {
            const selected = data.binary[q.id];
            let optsHtml = `<div class="opt-btn ${selected === 'A' ? 'active' : ''}" data-binary="${q.id}" data-choice="A">${q.optA}</div>
                            <div class="opt-btn ${selected === 'B' ? 'active' : ''}" data-binary="${q.id}" data-choice="B">${q.optB}</div>`;
            html += `<div class="question-group"><div class="question-label">🍽️ ${q.label}</div><div class="options-row" data-binary-group="${q.id}">${optsHtml}</div></div>`;
        });
        return html;
    }

    // 只读摘要
    function buildReadonlySummary(data) {
        let html = `<div class="readonly-summary">`;
        // 单项
        singleQuestions.forEach(q => {
            const idx = data.single[q.id];
            const val = (idx !== undefined && q.options[idx]) ? q.options[idx] : '未选';
            html += `<div class="summary-item"><strong>${q.label}</strong><br>${val}</div>`;
        });
        // 口味
        html += `<div class="summary-item"><strong>👅 口味偏好</strong><br>${data.taste.length ? data.taste.join('、') : '无偏好'}</div>`;
        // 菜系
        html += `<div class="summary-item"><strong>🍽️ 菜系偏好</strong><br>${data.cuisine.length ? data.cuisine.join('、') : '无偏好'}</div>`;
        // 小料
        html += `<div class="summary-item"><strong>🧂 小料偏好</strong><br>${data.topping.length ? data.topping.join('、') : '无偏好'}</div>`;
        // 争议食物
        html += `<div class="summary-item"><strong>⚠️ 争议食物接受</strong><br>${data.controversy.length ? data.controversy.join('、') : '无偏好'}</div>`;
        // 二选一
        binaryQuestions.forEach(q => {
            const choice = data.binary[q.id];
            let val = choice === 'A' ? q.optA : (choice === 'B' ? q.optB : '未选');
            html += `<div class="summary-item"><strong>${q.label}</strong><br>${val}</div>`;
        });
        html += `</div>`;
        return html;
    }

    // 绑定事件（可编辑区域）
    function attachFormEvents(prefix) {
        const container = prefix === 'my' ? document.getElementById('myForm') : document.getElementById('partnerForm');
        if (!container) return;
        const data = prefix === 'my' ? myAnswers : partnerAnswers;
        const updateCallback = () => {
            if (prefix === 'my') {
                renderMyForm();
                // 如果我的答案完整，显示邀请栏
                checkMyCompletionAndShowInvite();
            } else {
                renderPartnerForm();
            }
        };

        // 单选题
        container.querySelectorAll('[data-group^="single_"]').forEach(group => {
            group.querySelectorAll('.opt-btn').forEach(btn => {
                btn.onclick = (e) => {
                    const qid = btn.getAttribute('data-qid');
                    const val = parseInt(btn.getAttribute('data-val'));
                    data.single[qid] = val;
                    updateCallback();
                };
            });
        });
        // 口味（限2）
        const tasteGroup = container.querySelector(`#tasteGroup_${prefix}`);
        if (tasteGroup) {
            tasteGroup.querySelectorAll('.checkbox-item').forEach(item => {
                item.onclick = () => {
                    const val = item.getAttribute('data-taste');
                    const idx = data.taste.indexOf(val);
                    if (idx !== -1) data.taste.splice(idx, 1);
                    else {
                        if (data.taste.length >= 2) data.taste.shift();
                        data.taste.push(val);
                    }
                    updateCallback();
                };
            });
        }
        // 菜系
        const cuisineGroup = container.querySelector(`#cuisineGroup_${prefix}`);
        if (cuisineGroup) {
            cuisineGroup.querySelectorAll('.checkbox-item').forEach(item => {
                item.onclick = () => {
                    const val = item.getAttribute('data-cuisine');
                    const idx = data.cuisine.indexOf(val);
                    if (idx !== -1) data.cuisine.splice(idx, 1);
                    else data.cuisine.push(val);
                    updateCallback();
                };
            });
        }
        // 小料
        const toppingGroup = container.querySelector(`#toppingGroup_${prefix}`);
        if (toppingGroup) {
            toppingGroup.querySelectorAll('.checkbox-item').forEach(item => {
                item.onclick = () => {
                    const val = item.getAttribute('data-topping');
                    const idx = data.topping.indexOf(val);
                    if (idx !== -1) data.topping.splice(idx, 1);
                    else data.topping.push(val);
                    updateCallback();
                };
            });
        }
        // 争议食物
        const controGroup = container.querySelector(`#controversyGroup_${prefix}`);
        if (controGroup) {
            controGroup.querySelectorAll('.checkbox-item').forEach(item => {
                item.onclick = () => {
                    const val = item.getAttribute('data-contro');
                    const idx = data.controversy.indexOf(val);
                    if (idx !== -1) data.controversy.splice(idx, 1);
                    else data.controversy.push(val);
                    updateCallback();
                };
            });
        }
        // 二选一
        binaryQuestions.forEach(q => {
            const group = container.querySelector(`.options-row[data-binary-group="${q.id}"]`);
            if (group) {
                group.querySelectorAll('.opt-btn').forEach(btn => {
                    btn.onclick = () => {
                        const choice = btn.getAttribute('data-choice');
                        data.binary[q.id] = choice;
                        updateCallback();
                    };
                });
            }
        });
    }

    // 检查我的答案是否完整（所有单选和二选一都已选，多选可以为空）
    function isMyAnswersComplete() {
        for (let q of singleQuestions) {
            if (myAnswers.single[q.id] === undefined) return false;
        }
        for (let q of binaryQuestions) {
            if (!myAnswers.binary[q.id]) return false;
        }
        return true;
    }

    function checkMyCompletionAndShowInvite() {
        const inviteBar = document.getElementById('inviteBar');
        if (isMyAnswersComplete()) {
            const link = generateInviteLink();
            document.getElementById('inviteLink').innerText = link;
            inviteBar.style.display = 'flex';
        } else {
            inviteBar.style.display = 'none';
        }
    }

    // 匹配度计算（与之前逻辑一致）
    function calcMatchScore(userA, userB) {
        let totalWeight = 0;
        let totalScore = 0;
        for (let q of singleQuestions) {
            totalWeight += 1;
            const aVal = userA.single[q.id];
            const bVal = userB.single[q.id];
            if (aVal !== undefined && bVal !== undefined && aVal === bVal) totalScore += 1;
        }
        const tasteInter = new Set(userA.taste.filter(x => userB.taste.includes(x))).size;
        const tasteUnion = new Set([...userA.taste, ...userB.taste]).size;
        const tasteSim = tasteUnion === 0 ? 1 : tasteInter / tasteUnion;
        totalWeight += 1; totalScore += tasteSim;
        const cuisineInter = new Set(userA.cuisine.filter(x => userB.cuisine.includes(x))).size;
        const cuisineUnion = new Set([...userA.cuisine, ...userB.cuisine]).size;
        const cuisineSim = cuisineUnion === 0 ? 1 : cuisineInter / cuisineUnion;
        totalWeight += 1; totalScore += cuisineSim;
        const topInter = new Set(userA.topping.filter(x => userB.topping.includes(x))).size;
        const topUnion = new Set([...userA.topping, ...userB.topping]).size;
        const topSim = topUnion === 0 ? 1 : topInter / topUnion;
        totalWeight += 1; totalScore += topSim;
        const controInter = new Set(userA.controversy.filter(x => userB.controversy.includes(x))).size;
        const controUnion = new Set([...userA.controversy, ...userB.controversy]).size;
        const controSim = controUnion === 0 ? 1 : controInter / controUnion;
        totalWeight += 1; totalScore += controSim;
        for (let q of binaryQuestions) {
            totalWeight += 1;
            const aChoice = userA.binary[q.id];
            const bChoice = userB.binary[q.id];
            if (aChoice && bChoice && aChoice === bChoice) totalScore += 1;
        }
        return Math.min(100, Math.round((totalScore / totalWeight) * 100));
    }

    function getMatchLevel(percent) {
        if (percent < 30) return { text: "❌ 不匹配", color: "#C0392B", advice: "口味差异较大，建议先约个简单餐饮互相了解～" };
        if (percent >= 30 && percent < 50) return { text: "⚠️ 有点匹配", color: "#E67E22", advice: "部分偏好相似，可以尝试中和口味的餐厅" };
        if (percent >= 50 && percent < 80) return { text: "👍 一般匹配", color: "#F39C12", advice: "有不少共同喜好，大概率能愉快干饭！" };
        return { text: "🎉 非常匹配", color: "#27AE60", advice: "灵魂饭搭子！一起探索美食天堂吧～" };
    }

    function validateBeforeMatch() {
        // 检查我方完整性
        if (!isMyAnswersComplete()) {
            alert("请先完成「我的口味档案」中所有单选题和二选一问题");
            return false;
        }
        // 检查搭子方完整性（非只读模式下需要完成，只读模式说明已经通过邀请加载了数据，数据应该是完整的）
        if (!isPartnerReadonly) {
            for (let q of singleQuestions) {
                if (partnerAnswers.single[q.id] === undefined) {
                    alert("请完成「搭子的口味档案」中所有单选题和二选一问题");
                    return false;
                }
            }
            for (let q of binaryQuestions) {
                if (!partnerAnswers.binary[q.id]) {
                    alert("请完成「搭子的口味档案」中所有二选一问题");
                    return false;
                }
            }
        } else {
            // 只读模式下，检查邀请加载的数据是否完整（理论上完整，但以防万一）
            for (let q of singleQuestions) {
                if (partnerAnswers.single[q.id] === undefined) {
                    alert("邀请数据不完整，请重新生成邀请链接");
                    return false;
                }
            }
            for (let q of binaryQuestions) {
                if (!partnerAnswers.binary[q.id]) return false;
            }
        }
        return true;
    }

    function computeAndShow() {
        if (!validateBeforeMatch()) return;
        const score = calcMatchScore(myAnswers, partnerAnswers);
        const level = getMatchLevel(score);
        const resultDiv = document.getElementById("resultArea");
        resultDiv.innerHTML = `
            <div class="match-score">${score}%</div>
            <div class="match-level" style="color:${level.color}">${level.text}</div>
            <div style="margin: 0.8rem 0; padding: 0.5rem; background: #FFF0E0; border-radius: 2rem;">💡 ${level.advice}</div>
            <div class="detail-note">⭐ 基于饮食观念、口味、菜系、小料、争议食物及11组二选一综合计算</div>
            <button id="resetMatchBtn" style="background:#C08142; margin-top:10px; padding:0.3rem 1rem; font-size:0.75rem;">🔄 重新匹配</button>
        `;
        const resetBtn = document.getElementById("resetMatchBtn");
        if (resetBtn) resetBtn.onclick = () => { location.reload(); };
    }

    // 复制链接
    function copyInviteLink() {
        const link = document.getElementById('inviteLink').innerText;
        if (link && link !== '生成中...') {
            navigator.clipboard.writeText(link).then(() => {
                alert("邀请链接已复制，发送给好友吧！");
            }).catch(() => alert("复制失败，可手动复制"));
        }
    }

    // 初始化
    function init() {
        const hasInvite = loadInviteFromUrl();
        renderMyForm();
        renderPartnerForm();
        if (hasInvite) {
            // 如果有邀请，右侧只读，不需要额外操作
            const partnerTitle = document.getElementById('partnerTitle');
            if (partnerTitle) partnerTitle.innerHTML = "👥 好友的口味档案（已填写，只读）";
        }
        // 生成邀请按钮
        document.getElementById('generateInviteBtn').onclick = () => {
            if (!isMyAnswersComplete()) {
                alert("请先完成我的口味档案中所有单选题和二选一问题");
                return;
            }
            const link = generateInviteLink();
            document.getElementById('inviteLink').innerText = link;
            document.getElementById('inviteBar').style.display = 'flex';
            alert("邀请链接已生成，点击下方复制按钮分享给好友");
        };
        document.getElementById('copyInviteBtn').onclick = copyInviteLink;
        document.getElementById('matchBtn').onclick = computeAndShow;
        checkMyCompletionAndShowInvite();
    }

    init();
</script>
</body>
